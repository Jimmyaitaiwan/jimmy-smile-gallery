<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笑一笑，世界多美妙</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0d0d;
      color: #d4d4d4;
      font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
      line-height: 1.8;
    }

    /* ── Header ── */
    header {
      padding: 80px 40px 60px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.15em;
      color: #e8e8e8;
    }

    header p {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.1em;
    }

    /* ── Section Title ── */
    .section-label {
      padding: 50px 40px 20px;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: #444;
      text-transform: uppercase;
    }

    /* ── Photo Grid ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 0 40px;
    }

    .photo-item {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: #1a1a1a;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.4s ease;
      opacity: 0.85;
    }

    .photo-item:hover img {
      transform: scale(1.04);
      opacity: 1;
    }

    .photo-item .meta {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 14px 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      font-size: 0.75rem;
      color: #bbb;
      opacity: 0;
      transition: opacity 0.3s ease;
      letter-spacing: 0.05em;
    }

    .photo-item:hover .meta {
      opacity: 1;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 100;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      cursor: default;
    }

    #lightbox .lb-close {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 1.8rem;
      color: #555;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    #lightbox .lb-close:hover {
      color: #ccc;
    }

    /* ── Divider ── */
    .divider {
      margin: 60px 40px 0;
      border: none;
      border-top: 1px solid #1e1e1e;
    }

    /* ── Journal ── */
    .journal-list {
      padding: 0 40px 80px;
      max-width: 680px;
    }

    .journal-item {
      padding: 32px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .journal-item:last-child {
      border-bottom: none;
    }

    .journal-item .date {
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .journal-item .text {
      font-size: 0.95rem;
      color: #b0b0b0;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .photo-grid {
        grid-template-columns: repeat(2, 1fr);
        padding: 0 12px;
        gap: 2px;
      }
      .section-label { padding: 40px 12px 16px; }
      .journal-list { padding: 0 20px 60px; }
      .divider { margin: 40px 12px 0; }
    }
  </style>
</head>
<body>

  <header>
    <h1>笑一笑，世界多美妙</h1>
    <p>攝影 · 文字</p>
  </header>

  <!-- ── 攝影 ── -->
  <div class="section-label">攝影</div>

  <div class="photo-grid" id="photoGrid">
    <!--
      加照片方式：
      <div class="photo-item" onclick="openLightbox('photos/你的照片.jpg')">
        <img src="photos/你的照片.jpg" alt="">
        <div class="meta">2026-04 · 台南</div>
      </div>
    -->

    <!-- 範例佔位（可刪除） -->
    <div class="photo-item" onclick="openLightbox('photos/1.jpeg')">
      <img src="photos/1.jpeg" alt="">
      <div class="meta">2026-02 · 虎尾一角</div>
    </div>
    <div class="photo-item" onclick="openLightbox('https://picsum.photos/seed/b/800/800')">
      <img src="https://picsum.photos/seed/b/600/600" alt="">
      <div class="meta">2026-03 · 台南</div>
    </div>
    <div class="photo-item" onclick="openLightbox('https://picsum.photos/seed/c/800/800')">
      <img src="https://picsum.photos/seed/c/600/600" alt="">
      <div class="meta">2026-03 · 山上</div>
    </div>
    <div class="photo-item" onclick="openLightbox('https://picsum.photos/seed/d/800/800')">
      <img src="https://picsum.photos/seed/d/600/600" alt="">
      <div class="meta">2026-02 · 基隆</div>
    </div>
    <div class="photo-item" onclick="openLightbox('https://picsum.photos/seed/e/800/800')">
      <img src="https://picsum.photos/seed/e/600/600" alt="">
      <div class="meta">2026-01 · 台中</div>
    </div>
    <div class="photo-item" onclick="openLightbox('https://picsum.photos/seed/f/800/800')">
      <img src="https://picsum.photos/seed/f/600/600" alt="">
      <div class="meta">2025-12 · 花蓮</div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <span class="lb-close" onclick="closeLightbox()">×</span>
    <img id="lbImg" src="" alt="" onclick="event.stopPropagation()">
  </div>

  <hr class="divider">

  <!-- ── 隨筆 ── -->
  <div class="section-label">隨筆</div>

  <div class="journal-list">
    <!--
      加隨筆方式：
      <div class="journal-item">
        <div class="date">2026-04-07</div>
        <div class="text">內容寫在這裡。</div>
      </div>
    -->

    <!-- 範例（可刪除） -->
    <div class="journal-item">
      <div class="date">2026-04-07</div>
      <div class="text">這是第一篇隨筆。想到什麼就寫什麼，不用有結論。(這是AI範本)</div>
    </div>
    <div class="journal-item">
      <div class="date">2026-03-15</div>
      <div class="text">有時候拿起相機，不是為了記錄什麼，只是想讓自己慢下來。(這也是AI範本)</div>
    </div>
  </div>

  <script>
    function openLightbox(src) {
      document.getElementById('lbImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.getElementById('lbImg').src = '';
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
